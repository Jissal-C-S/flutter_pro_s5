name: Build Flutter APK
on: 
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    # 1. Setup Java (Required for Android builds)
    - uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17' 
        
    # 2. Setup Flutter
    - uses: subosito/flutter-action@v3
      with:
        flutter-version: '3.x'
        
    # 3. Get dependencies 
    - run: flutter pub get
      
    # 4. Build the APK
    - run: flutter build apk --release
      
    # 5. Upload the final APK so you can download it
    - uses: actions/upload-artifact@v4
      with:
        name: release-apk
        path: build/app/outputs/flutter-apk/app-release.apk